# Skill gazetteer for skill extraction (spark_jobs/skill_extract.py).
# Each canonical skill maps to a list of case-insensitive aliases (zh + en).
# Matching is done on word boundaries over title + description + requirements.
# This is the explainable, fast baseline; skillNer/MLlib is documented as the
# future upgrade in the report.

